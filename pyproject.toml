[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C4", "ARG"]
ignore = []

[tool.coverage.run]
source = ["Echo-backend"]
omit = [
    "Echo-backend/tests/*",
    "Echo-backend/test.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
